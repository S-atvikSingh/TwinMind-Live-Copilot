<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TwinMind Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .col-h { height: calc(100vh - 100px); }
        .batch-separator { border-top: 1px solid #334155; margin: 24px 0; position: relative; }
        .batch-label { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #0f172a; padding: 0 12px; font-size: 10px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 overflow-hidden font-sans">
    <header class="h-16 border-b border-slate-800 flex items-center justify-between gap-4 px-8">
        <h1 class="text-xl font-bold tracking-tight text-white shrink-0">TwinMind</h1>
        <div id="metricsBar" class="text-[10px] text-slate-500 font-mono truncate text-right flex-1 min-w-0" title="Rolling median latency (last up to 10 calls per endpoint)"></div>
        <button id="settingsBtn" class="p-2 hover:bg-slate-800 rounded-full transition shrink-0">⚙️</button>
    </header>

    <main class="flex p-6 gap-6">
        <section class="w-1/3 bg-[#1e293b]/40 border border-slate-800 rounded-2xl p-6 col-h flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-[11px] font-black text-slate-500 uppercase tracking-widest">1. Mic & Transcript</h2>
                <span id="micStatus" class="text-[10px] text-slate-500 uppercase">Idle</span>
            </div>
            <div id="transcriptBanner" class="hidden mb-3 text-[11px] rounded-lg border px-3 py-2"></div>
            
            <div class="flex items-center gap-4 mb-8 p-4 bg-slate-900/50 rounded-xl border border-slate-800">
                <button id="micBtn" class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center hover:bg-blue-500 transition shadow-lg shadow-blue-900/20">
                    <div id="micIcon" class="w-3 h-3 bg-white rounded-full"></div>
                </button>
                <div>
                    <p id="micActionText" class="text-sm font-medium">Click mic to start.</p>
                    <p class="text-[10px] text-slate-500">Transcript appends every ~30s.</p>
                </div>
            </div>

            <div id="transcriptArea" class="flex-1 overflow-y-auto space-y-4 text-sm text-slate-400 pr-2">
                <p class="italic text-slate-600">No transcript yet — start the mic.</p>
            </div>
            
            <div class="mt-4 pt-4 border-t border-slate-800">
                <button id="exportBtn" class="text-[11px] font-bold text-slate-500 hover:text-white uppercase tracking-wider">Export Session</button>
            </div>
        </section>

        <section class="w-1/3 bg-[#1e293b]/40 border border-slate-800 rounded-2xl p-6 col-h flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">2. Live Suggestions</h2>
                <span id="refreshTimer" class="text-[10px] text-slate-500">auto-refresh in 30s</span>
            </div>
            <div id="suggestionsBanner" class="hidden mb-3 text-[11px] rounded-lg border px-3 py-2"></div>
            <div id="lastRefreshInfo" class="text-[10px] text-slate-500 mb-3 uppercase tracking-wide">last refresh: not yet</div>
            <button id="refreshBtn" class="w-full py-2.5 mb-6 bg-slate-800/80 border border-slate-700 rounded-xl text-xs font-semibold hover:bg-slate-700 transition">↻ Reload suggestions</button>
            <div id="suggestionsArea" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
        </section>

        <section class="w-1/3 bg-[#1e293b]/40 border border-slate-800 rounded-2xl p-6 col-h flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">3. Chat (Detailed Answers)</h2>
                <span class="text-[10px] text-slate-500 uppercase">Session-Only</span>
            </div>
            <div id="chatBanner" class="hidden mb-3 text-[11px] rounded-lg border px-3 py-2"></div>
            <div id="chatArea" class="flex-1 overflow-y-auto space-y-4 mb-6 pr-2"></div>
            <div class="relative group">
                <input id="chatInput" type="text" placeholder="Ask anything..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 pr-16 text-sm outline-none focus:border-blue-500 transition">
                <button id="sendBtn" class="absolute right-3 top-3 bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition">Send</button>
            </div>
        </section>
    </main>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 overflow-y-auto p-4 md:p-10 flex flex-col">
        <div class="bg-[#1e293b] w-full max-w-xl rounded-3xl p-10 border border-slate-700 shadow-2xl my-auto mx-auto">
            <h3 class="text-2xl font-bold mb-8">Settings</h3>
            <form id="settingsForm">
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Groq API Key</label>
                        <input id="apiKey" type="password" autocomplete="off" placeholder="gsk_..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Suggestions Prompt (30s Cycle)</label>
                        <textarea id="suggPrompt" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 h-28 text-sm focus:border-blue-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Expansion/Chat Prompt</label>
                        <textarea id="chatPrompt" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 h-28 text-sm focus:border-blue-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Suggestions Prompt Context</label>
                        <textarea id="suggPromptContext" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 h-28 text-sm focus:border-blue-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Expansion Prompt Context</label>
                        <textarea id="chatPromptContext" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 h-28 text-sm focus:border-blue-500 outline-none"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Suggestion Last N Characters</label>
                            <input id="suggLastNChars" type="number" min="500" step="100" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Chat Last N Characters</label>
                            <input id="chatLastNChars" type="number" min="1000" step="100" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="flex items-center justify-between border border-slate-700 rounded-xl p-3">
                        <label for="showPromptDebug" class="text-[11px] text-slate-300">Prompt clarity debug (show payload)</label>
                        <input id="showPromptDebug" type="checkbox" class="h-4 w-4">
                    </div>
                    <div id="promptDebugPanel" class="hidden">
                        <div class="flex items-center justify-between mb-2 gap-2">
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">Prompt / API log (recent)</label>
                            <button type="button" id="exportPromptLogBtn" class="text-[10px] font-bold text-blue-400 hover:text-blue-300 uppercase">Export log JSON</button>
                        </div>
                        <textarea id="promptDebugText" readonly class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 h-48 text-xs text-slate-300 outline-none font-mono"></textarea>
                    </div>
                    <div class="flex justify-end gap-4 mt-8">
                        <button id="closeSettings" type="button" class="px-6 py-2 text-slate-400 hover:text-white transition">Cancel</button>
                        <button id="saveSettings" type="button" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition">Save Settings</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/context.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
